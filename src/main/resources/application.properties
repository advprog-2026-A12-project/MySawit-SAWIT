server.port=8082

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dummy_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:dummy_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.sql.init.mode=never
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy_cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy_secret}
